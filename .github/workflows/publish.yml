name: 🚀 Publish to NPM

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  npm_publish:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: 🚀 Publish to NPM

    steps:
      - uses: actions/checkout@v6

      - name: 📦 Enable Corepack
        run: corepack enable

      - name: 🔧 Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: 📦 Install dependencies
        # Use immutable install on CI to prevent accidental lockfile changes
        run: yarn install --immutable

      - name: 🏗️ Build app
        run: yarn build

      - name: 🧪 Tests
        run: yarn test

      # - name: 📊 Upload coverage to Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     fail_ci_if_error: true

      - name: 🚀 Publish NPM
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') == false
        run: cd dist && npm publish --access public

      - name: 🚀 Publish NPM BETA
        if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'beta') == true
        run: cd dist && npm publish --access public --tag beta
